    - paragraph [ref=e48]: Google apps are the proprietary Google-branded applications that come pre-installed with most Android devices, such as the Play Store, Gmail, Maps, etc. Due to licensing restrictions, these apps cannot come pre-installed with LineageOS and must be installed separately. The Google apps are not required to boot or run LineageOS, however many users find them beneficial to take full advantage of the Android ecosystem.
    - paragraph [ref=e49]: These apps have been packaged by developers independent of LineageOS, and download links have been provided for your convenience only. It is possible to perform a “backup” of the Google apps on your device and then “restore” them, but this does take additional steps which are not covered here.
    - paragraph [ref=e50]:
      - text: The Google apps packages are
      - strong [ref=e51]: not supported
      - text: in any way by LineageOS.
